<section class="location-section" id="ubicacion">
  <div class="location-inner">

    <div class="location-info">
      <span class="section-label">Encuéntranos</span>
      <h2 class="section-title">Ven y Vívelo<br>Tú Mismo</h2>

      <div class="info-item" *ngFor="let item of infoItems">
        <div class="info-icon">
          <!-- Pin -->
          <svg *ngIf="item.icon === 'pin'" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
          <!-- Clock -->
          <svg *ngIf="item.icon === 'clock'" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <!-- Car -->
          <svg *ngIf="item.icon === 'car'" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
            <rect x="1" y="3" width="15" height="13" rx="1"/>
            <path d="M16 8h4l3 3v5h-7V8z"/>
            <circle cx="5.5" cy="18.5" r="2.5"/>
            <circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
        </div>
        <div class="info-text">
          <h4>{{ item.title }}</h4>
          <p [innerHTML]="item.text"></p>
        </div>
      </div>

      <a [href]="content.whatsappOrderUrl" target="_blank" class="btn-primary cta-wa">
        💬 ¿Antojo de un mixto? Escríbenos
      </a>
    </div>

    <div class="map-container">
      <iframe
        [src]="mapUrl"
        allowfullscreen
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="Mapa Encebollados Las 5 Esquinas"
      ></iframe>
    </div>

  </div>
</section>
