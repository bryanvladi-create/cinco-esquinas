<section class="hero" id="inicio">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <span class="hero-badge">🐟 Encebollados Las 5 Esquinas · Sur de Quito</span>

    <h1>El Sabor <span class="accent">Legendario</span><br>que el Sur de Quito Ama.</h1>

    <p class="hero-sub">
      Más de 2,000 personas lo confirman: el auténtico encebollado<br>
      con la sazón que te levanta el ánimo.
    </p>

    <div class="hero-ctas">
      <a [href]="content.whatsappUrl" target="_blank" class="btn-primary">
        🛒 Pedir en Línea Ahora
      </a>
      <a [href]="content.mapsUrl" target="_blank" class="btn-secondary">
        📍 Cómo Llegar
      </a>
    </div>
  </div>

  <div class="scroll-hint">
    <span>Ver más</span>
    <div class="scroll-arrow"></div>
  </div>
</section>
